  - type: sections
    max_columns: 4
    title: Balkon
    path: balkon
    icon: mdi:flower
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:flower-tulip
            heading: Pflanztöpfe

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*
                  options:
                    type: custom:button-card
                    show_icon: false
                    show_name: true
                    show_state: false
                    show_label: true
                    aspect_ratio: 1/1.25
                    name: |
                      [[[
                        const friendly = entity.attributes.friendly_name || "";
                        const entityId = entity.entity_id || "";

                        let match =
                          friendly.match(/(\d{1,2})$/) ||
                          entityId.match(/_(\d{1,2})$/);

                        if (match) {
                          return `Pflanzcontainer ${match[1].padStart(2, "0")}`;
                        }

                        return friendly
                          .replace(/^Garten\s+/i, "")
                          .replace(/Pflanzcontainer\s*/i, "Pflanzcontainer ");
                      ]]]
                    label: |
                      [[[
                        const names =
                          entity.attributes.plant_names ||
                          entity.attributes.pflanzen ||
                          entity.attributes.plants ||
                          entity.state;

                        if (Array.isArray(names)) {
                          return names.join(", ");
                        }

                        return names || "";
                      ]]]
                    styles:
                      card:
                        - border-radius: 22px
                        - overflow: hidden
                        - padding: 0
                        - background: |
                            [[[
                              const imgs =
                                entity.attributes.image_urls ||
                                entity.attributes.images ||
                                entity.attributes.image_url ||
                                "";

                              let img = "";

                              if (Array.isArray(imgs) && imgs.length > 0) {
                                img = imgs[0];
                              } else if (typeof imgs === "string") {
                                img = imgs;
                              }

                              if (img) {
                                return `linear-gradient(to bottom, rgba(0,0,0,0.04), rgba(0,0,0,0.72)), url("${img}")`;
                              }

                              return "linear-gradient(145deg, #dff5e4, #ffffff)";
                            ]]]
                        - background-size: cover
                        - background-position: center
                        - box-shadow: 0 10px 24px rgba(0,0,0,0.18)
                      grid:
                        - grid-template-areas: '"n" "l"'
                        - grid-template-rows: 1fr min-content
                        - height: 100%
                      name:
                        - align-self: end
                        - justify-self: start
                        - padding: 0 14px
                        - color: white
                        - font-weight: 800
                        - font-size: 18px
                        - text-shadow: 0 2px 8px rgba(0,0,0,0.85)
                      label:
                        - justify-self: start
                        - padding: 2px 14px 14px 14px
                        - color: rgba(255,255,255,0.94)
                        - font-size: 15px
                        - font-weight: 600
                        - white-space: normal
                        - text-align: left
                        - text-shadow: 0 2px 8px rgba(0,0,0,0.85)
                    tap_action:
                      action: more-info

              exclude:
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewassert
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewaessert
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewässert
                - entity_id: "*timestamp*"
                - entity_id: "*telemetry*_timestamp"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"

            sort:
              method: name

