  - type: sections
    max_columns: 4
    title: Balkon
    path: balkon
    icon: mdi:flower
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:view-dashboard-outline
            heading: Übersicht

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_batterie
                  options:
                    type: tile
                    name: Batterie
                    icon: mdi:battery
                    color: green
                - entity_id: sensor.garten_temperatur
                  options:
                    type: tile
                    name: Temperatur
                    icon: mdi:thermometer
                    color: orange
                - entity_id: sensor.garten_wasserfullstand
                  options:
                    type: tile
                    name: Wasserfüllstand
                    icon: mdi:cup-water
                    color: blue
                - entity_id: sensor.garten_wasserfüllstand
                  options:
                    type: tile
                    name: Wasserfüllstand
                    icon: mdi:cup-water
                    color: blue
                - entity_id: sensor.garten_wasserabstand
                  options:
                    type: tile
                    name: Wasserabstand
                    icon: mdi:arrow-expand-vertical
                    color: cyan
                - entity_id: sensor.garten_rssi
                  options:
                    type: tile
                    name: WLAN
                    icon: mdi:wifi
                    color: cyan
                - entity_id: sensor.garten_durchfluss
                  options:
                    type: tile
                    name: Durchfluss
                    icon: mdi:waves-arrow-right
                    color: blue
                - entity_id: switch.garten_pumpe
                  options:
                    type: tile
                    name: Pumpe
                    icon: mdi:water-pump
                    color: blue
                    tap_action:
                      action: toggle
              exclude:
                - entity_id: '*timestamp*'
                - entity_id: '*telemetry*'
                - entity_id: '*aqua*'
                - entity_id: '*dreame*'
                - entity_id: '*sweepy*'
                - entity_id: '*api_user*'
                - entity_id: '*owner*'
                - entity_id: '*token*'
                - entity_id: '*truncated*'
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:water
            heading: Bewässerung

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_nachste_bewaesserung
                  options:
                    type: tile
                    name: Nächste Bewässerung
                    icon: mdi:calendar-clock
                    color: blue
                - entity_id: sensor.garten_nächste_bewässerung
                  options:
                    type: tile
                    name: Nächste Bewässerung
                    icon: mdi:calendar-clock
                    color: blue
                - entity_id: sensor.garten_nachfullzeit
                  options:
                    type: tile
                    name: Nachfüllzeit
                    icon: mdi:clock-outline
                    color: cyan
                - entity_id: sensor.garten_nachfüllzeit
                  options:
                    type: tile
                    name: Nachfüllzeit
                    icon: mdi:clock-outline
                    color: cyan
                - entity_id: sensor.garten_nachfullintervall
                  options:
                    type: tile
                    name: Nachfüllintervall
                    icon: mdi:calendar-refresh
                    color: cyan
                - entity_id: sensor.garten_nachfüllintervall
                  options:
                    type: tile
                    name: Nachfüllintervall
                    icon: mdi:calendar-refresh
                    color: cyan
                - entity_id: sensor.garten_pumpenstatus
                  options:
                    type: tile
                    name: Pumpenstatus
                    icon: mdi:pump
                    color: blue
                - entity_id: sensor.garten_pumpen_abgleich
                  options:
                    type: tile
                    name: Pumpen-Abgleich
                    icon: mdi:sync
                    color: blue
                - entity_id: sensor.garten_leckage_erkennung
                  options:
                    type: tile
                    name: Leckage
                    icon: mdi:pipe-leak
                    color: red
              exclude:
                - entity_id: '*telemetry*'
                - entity_id: '*timestamp*'
                - entity_id: '*pflanzcontainer*'
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:flower-tulip
            heading: Pflanztöpfe

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*
                  options:
                    type: tile
                    icon: mdi:flower-tulip
                    color: green
              exclude:
                - entity_id: '*zuletzt*bewassert*'
                - entity_id: '*zuletzt*bewaessert*'
                - entity_id: '*zuletzt*bewässert*'
                - entity_id: '*timestamp*'
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:watering-can-outline
            heading: Zuletzt bewässert

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewassert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewaessert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewässert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-box-outline
            heading: Weitere Gerätewerte

          - type: custom:auto-entities
            card:
              type: entities
              title: Details
              show_header_toggle: false
            filter:
              include:
                - entity_id: sensor.garten_firmware
                - entity_id: sensor.garten_status
                - entity_id: sensor.garten_maximale_pumpdauer
                - entity_id: sensor.garten_zuletzt_gesehen
                - entity_id: sensor.garten_battery_voltage*
                - entity_id: sensor.garten_solar_voltage*
                - entity_id: sensor.garten_input_current*
                - entity_id: sensor.garten_temperature_esp*
              exclude:
                - entity_id: '*timestamp*'
                - entity_id: '*telemetry*timestamp*'
                - entity_id: '*last_hour*'
                - entity_id: '*last_7d*'
                - entity_id: '*api_user*'
                - entity_id: '*owner*'
                - entity_id: '*token*'
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:cog-outline
            heading: Aktionen

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: button.garten_*
                  options:
                    type: tile
                    color: blue
                - entity_id: button.*boum*
                  options:
                    type: tile
                    color: blue
              exclude:
                - entity_id: '*aqua*'
                - entity_id: '*dreame*'
                - entity_id: '*sweepy*'
                - entity_id: '*api_user*'
                - entity_id: '*owner*'
                - entity_id: '*token*'
            sort:
              method: name
