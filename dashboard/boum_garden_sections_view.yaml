                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"

            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:history
            heading: 24h Verlauf

          - type: history-graph
            title: Batterie / Temperatur / Tank
            hours_to_show: 24
            entities:
