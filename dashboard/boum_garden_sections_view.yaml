  - type: sections
    max_columns: 4
    title: Balkon
    path: balkon
    icon: mdi:flower
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:flower-tulip
            heading: Pflanztöpfe

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*
                  options:
                    type: custom:button-card
                    show_icon: false
                    show_name: true
                    show_state: true
                    show_label: true
                    aspect_ratio: 1/1.25
                    name: |
                      [[[
                        return entity.attributes.friendly_name || entity.entity_id;
                      ]]]
                    label: |
                      [[[
                        const names = entity.attributes.plant_names || entity.attributes.pflanzen || entity.attributes.plants || entity.state;
                        if (Array.isArray(names)) return names.join(", ");
                        return names || "";
                      ]]]
                    custom_fields:
                      thumbs: |
                        [[[
                          const imgsRaw = entity.attributes.image_urls || entity.attributes.images || entity.attributes.image_url || [];
                          const imgs = Array.isArray(imgsRaw) ? imgsRaw : (imgsRaw ? [imgsRaw] : []);
                          if (imgs.length <= 1) return "";
                          const visible = imgs.slice(0, 3);
                          const html = visible.map((img) =>
                            `<img src="${img}" style="width:34px;height:34px;object-fit:cover;border-radius:50%;border:2px solid rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.45);margin-left:-8px;">`
                          ).join("");
                          const more = imgs.length > 3
                            ? `<span style="width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.58);border:2px solid rgba(255,255,255,.92);color:white;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-left:-8px;box-shadow:0 2px 8px rgba(0,0,0,.45);">+${imgs.length - 3}</span>`
                            : "";
                          return `<div style="display:flex;align-items:center;justify-content:flex-end;padding-right:8px;">${html}${more}</div>`;
                        ]]]
                    styles:
                      card:
                        - border-radius: 22px
                        - overflow: hidden
                        - padding: 0
                        - background: |
                            [[[
                              const imgs = entity.attributes.image_urls || entity.attributes.images || entity.attributes.image_url || "";
                              let img = "";
                              if (Array.isArray(imgs) && imgs.length > 0) img = imgs[0];
                              else if (typeof imgs === "string") img = imgs;
                              if (img) return `linear-gradient(to bottom, rgba(0,0,0,0.06), rgba(0,0,0,0.72)), url("${img}")`;
                              return "linear-gradient(145deg, #dff5e4, #ffffff)";
                            ]]]
                        - background-size: cover
                        - background-position: center
                        - box-shadow: 0 10px 24px rgba(0,0,0,0.18)
                      grid:
                        - grid-template-areas: '"n" "s" "l"'
                        - grid-template-rows: 1fr min-content min-content
                        - height: 100%
                      custom_fields:
                        thumbs:
                          - position: absolute
                          - top: 10px
                          - right: 10px
                          - z-index: 2
                      name:
                        - align-self: end
                        - justify-self: start
                        - padding: 0 14px
                        - color: white
                        - font-weight: 800
                        - font-size: 18px
                        - text-shadow: 0 2px 8px rgba(0,0,0,0.85)
                      state:
                        - justify-self: start
                        - padding: 2px 14px 0 14px
                        - color: white
                        - font-weight: 700
                        - font-size: 14px
                        - text-shadow: 0 2px 8px rgba(0,0,0,0.85)
                      label:
                        - justify-self: start
                        - padding: 0 14px 14px 14px
                        - color: rgba(255,255,255,0.92)
                        - font-size: 13px
                        - white-space: normal
                        - text-align: left
                        - text-shadow: 0 2px 8px rgba(0,0,0,0.85)
                    tap_action:
                      action: more-info
              exclude:
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewassert
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewaessert
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewässert
                - entity_id: "*timestamp*"
                - entity_id: "*telemetry*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-line
            heading: Status & Verlauf

          - type: sensor
            entity: sensor.garten_batterie
            name: Batterie
            icon: mdi:battery
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_temperatur
            name: Temperatur
            icon: mdi:thermometer
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_wasserfullstand
            name: Wasserfüllstand
            icon: mdi:cup-water
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_wassertank
            name: Wassertank
            icon: mdi:gauge
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_wasserabstand
            name: Wasserabstand
            icon: mdi:arrow-expand-vertical
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_durchfluss
            name: Durchfluss
            icon: mdi:waves-arrow-right
            graph: line
            detail: 2

      - type: grid
        cards:
          - type: heading
            icon: mdi:history
            heading: 24h Verlauf

          - type: history-graph
            title: Batterie / Temperatur / Wasser
            hours_to_show: 24
            entities:
              - entity: sensor.garten_batterie
                name: Batterie
              - entity: sensor.garten_temperatur
                name: Temperatur
              - entity: sensor.garten_wasserfullstand
                name: Wasserfüllstand
              - entity: sensor.garten_wassertank
                name: Wassertank
              - entity: sensor.garten_wasserabstand
                name: Wasserabstand

          - type: history-graph
            title: Bewässerung
            hours_to_show: 24
            entities:
              - entity: sensor.garten_durchfluss
                name: Durchfluss
              - entity: sensor.garten_pumpenstatus
                name: Pumpenstatus
              - entity: switch.garten_pumpe
                name: Pumpe

      - type: grid
        cards:
          - type: heading
            icon: mdi:water-pump
            heading: Bewässerung

          - type: tile
            entity: switch.garten_pumpe
            name: Pumpe
            icon: mdi:water-pump
            color: blue
            tap_action:
              action: toggle

          - type: tile
            entity: sensor.garten_pumpenstatus
            name: Pumpenstatus
            icon: mdi:pump
            color: blue

          - type: tile
            entity: sensor.garten_pumpenstatus_gemeldet
            name: Gemeldet
            icon: mdi:pump
            color: blue

          - type: tile
            entity: sensor.garten_pumpenstatus_gewunscht
            name: Gewünscht
            icon: mdi:pump-outline
            color: blue

          - type: tile
            entity: sensor.garten_pumpen_abgleich
            name: Pumpen-Abgleich
            icon: mdi:sync
            color: blue

          - type: tile
            entity: sensor.garten_nachfullzeit
            name: Nachfüllzeit
            icon: mdi:clock-outline
            color: cyan

          - type: tile
            entity: sensor.garten_nachfullintervall
            name: Nachfüllintervall
            icon: mdi:calendar-refresh
            color: cyan

          - type: tile
            entity: sensor.garten_nachste_bewaesserung
            name: Nächste Bewässerung
            icon: mdi:calendar-clock
            color: blue

          - type: tile
            entity: sensor.garten_maximale_pumpdauer
            name: Maximale Pumpdauer
            icon: mdi:timer-outline
            color: cyan

      - type: grid
        cards:
          - type: heading
            icon: mdi:watering-can-outline
            heading: Zuletzt bewässert

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewassert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewaessert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewässert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
              exclude:
                - entity_id: "*timestamp*"
                - entity_id: "*telemetry*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:gauge
            heading: Tank & Gerät

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_wasserfullstand
                  options:
                    type: tile
                    name: Wasserfüllstand
                    icon: mdi:cup-water
                    color: blue
                - entity_id: sensor.garten_wasserfüllstand
                  options:
                    type: tile
                    name: Wasserfüllstand
                    icon: mdi:cup-water
                    color: blue
                - entity_id: sensor.garten_wassertank
                  options:
                    type: tile
                    name: Wassertank
                    icon: mdi:gauge
                    color: blue
                - entity_id: sensor.garten_wasserabstand
                  options:
                    type: tile
                    name: Wasserabstand
                    icon: mdi:arrow-expand-vertical
                    color: cyan
                - entity_id: sensor.garten_rssi
                  options:
                    type: tile
                    name: WLAN
                    icon: mdi:wifi
                    color: blue
                - entity_id: sensor.garten_wifi_strength
                  options:
                    type: tile
                    name: WLAN
                    icon: mdi:wifi
                    color: blue
                - entity_id: sensor.garten_firmware
                  options:
                    type: tile
                    icon: mdi:chip
                    color: grey
                - entity_id: sensor.garten_leckage_erkennung
                  options:
                    type: tile
                    icon: mdi:pipe-leak
                    color: red
                - entity_id: sensor.garten_batteriespannung
                  options:
                    type: tile
                    icon: mdi:battery-charging
                    color: green
                - entity_id: sensor.garten_solarspannung
                  options:
                    type: tile
                    icon: mdi:solar-power
                    color: amber
                - entity_id: sensor.garten_esp_temperatur
                  options:
                    type: tile
                    icon: mdi:chip
                    color: orange
              exclude:
                - entity_id: "*telemetry*"
                - entity_id: "*timestamp*"
                - entity_id: "*last_hour*"
                - entity_id: "*last_7d*"
                - entity_id: "*battery_current*"
                - entity_id: "*input_current*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:cog-outline
            heading: Aktionen

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: button.garten_*
                  options:
                    type: tile
                    color: blue
                - entity_id: button.*boum*
                  options:
                    type: tile
                    color: blue
              exclude:
                - entity_id: "*telemetry*"
                - entity_id: "*timestamp*"
                - entity_id: "*last_hour*"
                - entity_id: "*last_7d*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name
