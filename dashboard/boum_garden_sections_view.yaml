  - type: sections
    max_columns: 4
    title: Balkon
    path: balkon
    icon: mdi:flower
    sections:
      - type: grid
        cards:
          - type: heading
            icon: mdi:flower-tulip
            heading: Pflanztöpfe

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*
                  options:
                    type: tile
                    icon: mdi:flower-tulip
                    color: green
              exclude:
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewassert
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewaessert
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewässert
                - entity_id: "*timestamp*"
                - entity_id: "*telemetry*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:chart-line
            heading: Status & Verlauf

          - type: sensor
            entity: sensor.garten_batterie
            name: Batterie
            icon: mdi:battery
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_temperatur
            name: Temperatur
            icon: mdi:thermometer
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_wasserabstand
            name: Wasserabstand
            icon: mdi:arrow-expand-vertical
            graph: line
            detail: 2

          - type: sensor
            entity: sensor.garten_durchfluss
            name: Durchfluss
            icon: mdi:waves-arrow-right
            graph: line
            detail: 2

          - type: history-graph
            title: 24h Verlauf
            hours_to_show: 24
            entities:
              - entity: sensor.garten_batterie
                name: Batterie
              - entity: sensor.garten_temperatur
                name: Temperatur
              - entity: sensor.garten_wasserabstand
                name: Wasserabstand
              - entity: sensor.garten_durchfluss
                name: Durchfluss

      - type: grid
        cards:
          - type: heading
            icon: mdi:water-pump
            heading: Bewässerung

          - type: tile
            entity: switch.garten_pumpe
            name: Pumpe
            icon: mdi:water-pump
            color: blue
            tap_action:
              action: toggle

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_nachste_bewaesserung
                  options:
                    type: tile
                    name: Nächste Bewässerung
                    icon: mdi:calendar-clock
                    color: blue
                - entity_id: sensor.garten_nächste_bewässerung
                  options:
                    type: tile
                    name: Nächste Bewässerung
                    icon: mdi:calendar-clock
                    color: blue
                - entity_id: sensor.garten_pumpenstatus
                  options:
                    type: tile
                    icon: mdi:pump
                    color: blue
                - entity_id: sensor.garten_pumpen_abgleich
                  options:
                    type: tile
                    name: Pumpen-Abgleich
                    icon: mdi:sync
                    color: blue
                - entity_id: sensor.garten_nachfullzeit
                  options:
                    type: tile
                    name: Nachfüllzeit
                    icon: mdi:clock-outline
                    color: cyan
                - entity_id: sensor.garten_nachfüllzeit
                  options:
                    type: tile
                    name: Nachfüllzeit
                    icon: mdi:clock-outline
                    color: cyan
                - entity_id: sensor.garten_nachfullintervall
                  options:
                    type: tile
                    name: Nachfüllintervall
                    icon: mdi:calendar-refresh
                    color: cyan
                - entity_id: sensor.garten_nachfüllintervall
                  options:
                    type: tile
                    name: Nachfüllintervall
                    icon: mdi:calendar-refresh
                    color: cyan
                - entity_id: sensor.garten_maximale_pumpdauer
                  options:
                    type: tile
                    name: Maximale Pumpdauer
                    icon: mdi:timer-outline
                    color: cyan
              exclude:
                - entity_id: "*telemetry*"
                - entity_id: "*timestamp*"
                - entity_id: "*last_hour*"
                - entity_id: "*last_7d*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:watering-can-outline
            heading: Zuletzt bewässert

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewassert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewaessert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
                - entity_id: sensor.garten_pflanzcontainer_*_zuletzt_bewässert
                  options:
                    type: tile
                    icon: mdi:watering-can
                    color: blue
              exclude:
                - entity_id: "*timestamp*"
                - entity_id: "*telemetry*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:gauge
            heading: Tank & Gerät

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: sensor.garten_wasserfullstand
                  options:
                    type: tile
                    name: Wasserfüllstand
                    icon: mdi:water
                    color: blue
                - entity_id: sensor.garten_wasserfüllstand
                  options:
                    type: tile
                    name: Wasserfüllstand
                    icon: mdi:water
                    color: blue
                - entity_id: sensor.garten_wasserabstand
                  options:
                    type: tile
                    name: Wasserabstand
                    icon: mdi:arrow-expand-vertical
                    color: cyan
                - entity_id: sensor.garten_rssi
                  options:
                    type: tile
                    name: WLAN
                    icon: mdi:wifi
                    color: blue
                - entity_id: sensor.garten_wifi_strength
                  options:
                    type: tile
                    name: WLAN
                    icon: mdi:wifi
                    color: blue
                - entity_id: sensor.garten_firmware
                  options:
                    type: tile
                    icon: mdi:chip
                    color: grey
                - entity_id: sensor.garten_leckage_erkennung
                  options:
                    type: tile
                    icon: mdi:pipe-leak
                    color: red
                - entity_id: sensor.garten_batteriespannung
                  options:
                    type: tile
                    icon: mdi:battery-charging
                    color: green
                - entity_id: sensor.garten_solarspannung
                  options:
                    type: tile
                    icon: mdi:solar-power
                    color: amber
                - entity_id: sensor.garten_esp_temperatur
                  options:
                    type: tile
                    icon: mdi:chip
                    color: orange
              exclude:
                - entity_id: "*telemetry*"
                - entity_id: "*timestamp*"
                - entity_id: "*last_hour*"
                - entity_id: "*last_7d*"
                - entity_id: "*battery_current*"
                - entity_id: "*input_current*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name

      - type: grid
        cards:
          - type: heading
            icon: mdi:cog-outline
            heading: Aktionen

          - type: custom:auto-entities
            card:
              type: grid
              columns: 2
              square: false
            card_param: cards
            filter:
              include:
                - entity_id: button.garten_*
                  options:
                    type: tile
                    color: blue
                - entity_id: button.*boum*
                  options:
                    type: tile
                    color: blue
              exclude:
                - entity_id: "*telemetry*"
                - entity_id: "*timestamp*"
                - entity_id: "*last_hour*"
                - entity_id: "*last_7d*"
                - entity_id: "*api_user*"
                - entity_id: "*owner*"
                - entity_id: "*token*"
                - entity_id: "*preview*"
                - entity_id: "*truncated*"
            sort:
              method: name
